<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>

    <!-- Accent gradient for glow effects -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF"/>
      <stop offset="50%" style="stop-color:#A371F7"/>
      <stop offset="100%" style="stop-color:#F778BA"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animated gradient for accent line -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF">
        <animate attributeName="stop-color" values="#58A6FF;#A371F7;#F778BA;#58A6FF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#A371F7">
        <animate attributeName="stop-color" values="#A371F7;#F778BA;#58A6FF;#A371F7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#F778BA">
        <animate attributeName="stop-color" values="#F778BA;#58A6FF;#A371F7;#F778BA" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      .name { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 64px; font-weight: 800; fill: #F0F6FC; letter-spacing: -2px; }
      .title { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 24px; font-weight: 600; fill: #58A6FF; letter-spacing: 4px; text-transform: uppercase; }
      .tagline { font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 20px; font-weight: 400; fill: #8B949E; }
      .highlight { fill: #A371F7; }
      .code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 14px; fill: #7EE787; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bgGrad)"/>

  <!-- Animated grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58A6FF" stroke-width="1"/>
    </pattern>
    <rect width="1280" height="400" fill="url(#grid)"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="100" cy="80" r="2" fill="#58A6FF">
      <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="320" r="1.5" fill="#A371F7">
      <animate attributeName="cy" values="320;340;320" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="100" r="2.5" fill="#F778BA">
      <animate attributeName="cy" values="100;120;100" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1180" cy="300" r="1.5" fill="#58A6FF">
      <animate attributeName="cy" values="300;280;300" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="350" r="2" fill="#7EE787">
      <animate attributeName="cy" values="350;330;350" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="250" r="1.8" fill="#F778BA">
      <animate attributeName="cy" values="250;270;250" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Decorative code blocks - left side -->
  <g transform="translate(40, 60)" opacity="0.15">
    <text class="code" y="0">const terry = {</text>
    <text class="code" y="20">  experience: "17+ years",</text>
    <text class="code" y="40">  passion: ["AI", "Web3"],</text>
    <text class="code" y="60">  teamsLed: "10 to 150+"</text>
    <text class="code" y="80">};</text>
  </g>

  <!-- Decorative code blocks - right side -->
  <g transform="translate(1050, 280)" opacity="0.15">
    <text class="code" y="0">async ship() {</text>
    <text class="code" y="20">  return impact;</text>
    <text class="code" y="40">}</text>
  </g>

  <!-- Main content -->
  <g transform="translate(100, 160)">
    <!-- Accent line above name -->
    <rect x="0" y="-20" width="80" height="4" rx="2" fill="url(#lineGrad)"/>

    <!-- Name -->
    <text y="50" class="name" filter="url(#textGlow)">Terry Kwon</text>

    <!-- Title -->
    <text y="95" class="title">Entrepreneur | CTO | Educator</text>

    <!-- Tagline -->
    <text y="140" class="tagline">Balancing technology and business to create customer value</text>
    <text y="168" class="tagline">
      <tspan fill="#58A6FF" font-weight="600">AI</tspan>
      <tspan fill="#8B949E"> | </tspan>
      <tspan fill="#A371F7" font-weight="600">Web3</tspan>
      <tspan fill="#8B949E"> | </tspan>
      <tspan fill="#F778BA" font-weight="600">Full-Stack</tspan>
      <tspan fill="#8B949E"> | </tspan>
      <tspan fill="#7EE787" font-weight="600">Product</tspan>
    </text>
  </g>

  <!-- Tech icons on right side -->
  <g transform="translate(900, 140)">
    <!-- AI/Brain icon -->
    <g transform="translate(0, 0)" filter="url(#glow)">
      <circle cx="30" cy="30" r="28" fill="none" stroke="#58A6FF" stroke-width="2" opacity="0.3"/>
      <path d="M30 15 C20 15 15 22 15 30 C15 38 20 45 30 45 C40 45 45 38 45 30 C45 22 40 15 30 15 M22 28 L25 28 M35 28 L38 28 M27 36 C28 38 32 38 33 36"
            stroke="#58A6FF" stroke-width="2" fill="none">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      </path>
      <circle cx="30" cy="30" r="4" fill="#58A6FF" opacity="0.8">
        <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Blockchain/cube icon -->
    <g transform="translate(80, 0)" filter="url(#glow)">
      <circle cx="30" cy="30" r="28" fill="none" stroke="#A371F7" stroke-width="2" opacity="0.3"/>
      <path d="M30 12 L45 22 L45 38 L30 48 L15 38 L15 22 Z M30 12 L30 28 M30 28 L45 38 M30 28 L15 38"
            stroke="#A371F7" stroke-width="2" fill="none">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Product/rocket icon -->
    <g transform="translate(160, 0)" filter="url(#glow)">
      <circle cx="30" cy="30" r="28" fill="none" stroke="#F778BA" stroke-width="2" opacity="0.3"/>
      <path d="M30 15 C25 20 22 28 22 35 L30 32 L38 35 C38 28 35 20 30 15 M26 40 L30 36 L34 40 M30 36 L30 44"
            stroke="#F778BA" stroke-width="2" fill="none">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- Connecting lines -->
    <line x1="58" y1="30" x2="82" y2="30" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
      <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="138" y1="30" x2="162" y2="30" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
      <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
    </line>

    <!-- Labels -->
    <text x="30" y="80" text-anchor="middle" class="tagline" font-size="12" fill="#58A6FF">AI</text>
    <text x="110" y="80" text-anchor="middle" class="tagline" font-size="12" fill="#A371F7">Web3</text>
    <text x="190" y="80" text-anchor="middle" class="tagline" font-size="12" fill="#F778BA">Product</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1280" height="4" fill="url(#lineGrad)"/>
</svg>
